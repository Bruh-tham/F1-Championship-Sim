<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>F1 — Points Editor & Probability Simulator</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/x-icon" href="https://www.formula1.com/assets/home/_next/static/media/f1-logo-180.1db9e85b.png"/>
  <style>
  /* ===================== COLORS ===================== */
  :root {
    --bg: #f3f6fb;
    --card: #ffffff;
    --surface: #f8fbff;
    --border: #d1d5db;
    --text: #0f1724;
    --muted: #6b7280;
    --accent: #0b63ff;
    --accent2: #7c3aed;
    --header-bg: #1e293b; 
    --header-text: #f8fafc; 
    --row-hover: #f1f5f9;
  }

  body.dark-mode {
    --bg: #0b0e11;
    --card: #10161b;
    --surface: #141c23;
    --border: rgba(255, 255, 255, 0.15);
    --text: #f8fafc;
    --muted: #94a3b8;
    --accent: #5ea8ff;
    --accent2: #a18bff;
    --header-bg: #18232c; 
    --header-text: #f8fafc;
    --row-hover: rgba(94, 168, 255, 0.1);
  }

  /* ===================== BASE RESET ===================== */
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; width: 100%; overflow-x: hidden; }
  body { 
    font-family: Inter, system-ui, sans-serif; 
    background: var(--bg); color: var(--text); 
    padding: 16px; font-size: 14px; 
    -webkit-font-smoothing: antialiased;
  }

  /* ===================== UI ELEMENTS ===================== */
  .container { max-width: 100%; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; }
  
  header { 
    background: var(--card); border: 1px solid var(--border); padding: 16px 20px; 
    border-radius: 12px; display: flex; flex-wrap: wrap; gap: 16px; 
    align-items: center; justify-content: space-between; 
  }
  h1 { margin: 0; font-size: 18px; font-weight: 800; color: var(--text); }

  .controls { display: flex; gap: 12px; margin-bottom: 16px; align-items: center; flex-wrap: wrap; }
  .page-nav { display: flex; gap: 8px; align-items: center; margin-bottom: 16px; }
  
  .btn { 
    padding: 8px 16px; border-radius: 6px; cursor: pointer; font-weight: 600; 
    border: 1px solid var(--border); background: var(--card); color: var(--text); 
  }
  .btn.primary { 
    background: linear-gradient(90deg, var(--accent), var(--accent2)); 
    color: #fff; border: none; 
  }
  
  .tabs { display: flex; gap: 6px; background: var(--surface); padding: 4px; border-radius: 8px; border: 1px solid var(--border); }
  .tab { padding: 8px 16px; border-radius: 6px; border: none; background: transparent; color: var(--muted); font-weight: 600; cursor: pointer; }
  .tab.active { 
    background: linear-gradient(90deg, var(--accent), var(--accent2)); 
    color: #fff; 
  }

  select { 
    padding: 6px 10px; border-radius: 6px; border: 1px solid var(--border); 
    background: var(--card); color: var(--text); font-weight: 600; font-family: inherit; cursor: pointer;
  }
  table select { min-width: 60px; padding: 6px; }

  .small-note { font-size: 12px; color: var(--muted); font-weight: 500; }
  .pts { font-weight: 800; color: var(--text); }
  .hdr-cell { position: relative; text-align: center; }
  .hdr-cell .hdr-main { font-size: 10px; font-weight: 800; color: #ef4444; text-transform: uppercase; }
  .hdr-cell .hdr-sub  { font-size: 13px; margin-top: 2px; font-weight: 700; }
  .hdr-cell .hdr-flag { font-size: 16px; margin-top: 2px; }
  .clear-btn { position: absolute; top: 0; right: 0; background: transparent; border: none; color: var(--header-text); opacity: 0.4; font-size: 16px; cursor: pointer; }
  .clear-btn:hover { opacity: 1; color: var(--accent); }

  /* ===================== DESKTOP AUTO-ADJUST LAYOUT ===================== */
  .layout { 
    display: flex; 
    flex-direction: row; 
    flex-wrap: nowrap !important; 
    gap: 20px; 
    width: 100%; 
    align-items: flex-start; 
    min-width: 0; 
  }
  
  .card { 
    background: var(--card); border: 1px solid var(--border); 
    border-radius: 12px; padding: 16px; 
  }
  
  /* Mutual Decision Math */
  #editorCard, #simCard { 
    flex: 0 1 auto; 
    width: max-content; 
    max-width: 65%; /* Keeps Editor from greedy expansion */
    min-width: 0; 
  }
  
  #standingsCard { 
    flex: 1 1 auto; 
    min-width: 0; 
    max-width: 100%; /* CRITICAL: Prevents the card from breaking the screen */
  }

  /* CRITICAL CONTAINED SWIPE: Side-by-side but native swipeable */
  .standings-flex { 
    display: flex; 
    flex-direction: row !important; 
    flex-wrap: nowrap !important; 
    gap: 20px; 
    width: 100%; /* CRITICAL: Stays within the card */
    overflow-x: auto; /* CRITICAL: Enables horizontal swiping */
    padding-bottom: 8px; /* Room for scrollbar */
    -webkit-overflow-scrolling: touch;
  }
  
  #driverStandings, #constructorStandings { 
    flex: 0 0 auto; 
    width: max-content; /* Hugs text without stretching */
    min-width: 0; 
  }

  /* ===================== TABLE SYSTEM ===================== */
  .table-responsive { 
    width: 100%; 
    overflow-x: auto; 
    border: 1px solid var(--border); border-radius: 8px; 
  }
  
  table { width: 100%; border-collapse: separate; border-spacing: 0; text-align: left; }

  #editorCard table, #simCard table, #driverStandings table, #constructorStandings table {
    width: max-content !important;
    min-width: 100%;
  }

  thead th { 
    background: var(--header-bg); color: var(--header-text); padding: 10px 12px; 
    font-weight: 700; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px;
    position: sticky; top: 0; z-index: 5; white-space: nowrap; 
    border-bottom: 2px solid var(--border); vertical-align: middle;
  }
  
  tbody td { padding: 8px 12px; border-bottom: 1px solid var(--border); white-space: nowrap; vertical-align: middle; }
  tbody tr:last-child td { border-bottom: none; }

  /* --- STICKY DRIVER COLUMN & HOVER --- */
  #driversHead th:first-child, #driversBody td:first-child { 
    position: sticky; left: 0; z-index: 10; border-right: 2px solid var(--border); 
    background: var(--card); min-width: 160px; max-width: 200px; 
  }
  #driversHead th:first-child { z-index: 20; background: var(--header-bg); }

  tbody tr:nth-child(even) td { background: rgba(0, 0, 0, 0.015); }
  body.dark-mode tbody tr:nth-child(even) td { background: rgba(255, 255, 255, 0.015); }

  tbody tr:hover td { background: var(--row-hover) !important; cursor: pointer; }
  tbody tr:hover td:first-child { background: var(--row-hover) !important; }

  /* Shrink Utility Columns */
  .standings-flex table th:nth-child(1), .standings-flex table td:nth-child(1),
  .standings-flex table th:nth-child(3), .standings-flex table td:nth-child(3),
  .standings-flex table th:nth-child(4), .standings-flex table td:nth-child(4) { 
    width: 1%; white-space: nowrap; padding-left: 10px; padding-right: 10px; text-align: center;
  }

  /* ===================== MOBILE OVERRIDES ===================== */
  @media (max-width: 992px) {
    /* Wraps layout on laptops/tablets/phones to prevent horizontal crush */
    .layout { flex-wrap: wrap !important; }
    #editorCard, #simCard, #standingsCard { width: 100%; flex: 1 1 100%; max-width: 100%; }
  }

  @media (max-width: 768px) {
    body { padding: 8px; }
    header { flex-direction: column; align-items: stretch; text-align: center; }
    .tabs { justify-content: center; }
    #driversHead th:first-child, #driversBody td:first-child { min-width: 120px; }
    /* Standings side-by-side swiping is already handled cleanly by .standings-flex */
  }
  </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>F1 — Points Editor & Probability Simulator</h1>
            <div class="tabs">
                <button class="tab active" id="tabEditor">Points Editor</button>
                <button class="tab" id="tabSim">Probability Simulator</button>
            </div>

            <!-- Dark mode toggle -->
            <button class="btn secondary" id="darkModeBtn" title="Toggle dark mode" style="margin-left:auto;">
              🌙 Dark
            </button>

            <!-- Hamburger menu for mobile -->
            <button class="hamburger" id="hamburgerBtn" aria-label="Menu" style="display:none;">
              <span></span><span></span><span></span>
            </button>
            <div class="mobile-menu" id="mobileMenu" style="display:none;">
              <button class="tab" id="mobileSimTab">Probability Simulator</button>
              <button class="tab" id="mobileStandingsTab">Standings</button>
            </div>
        </header>
        <div class="layout">
            <div class="card" id="editorCard">
                <div class="controls">
                    <button class="btn primary" id="resetBtn">Reset all predictions</button>
                    <button class="btn secondary" id="randomBtn">Randomize</button>
                </div>
                <div class="page-nav" style="display: flex; align-items: center; gap: 8px;">
                  <button id="prevPageBtn" class="btn secondary">‹ Prev</button>
                  <select id="pageSizeSelect" style="min-width: 100px; font-weight: 600;">
                    <option value="1">1 Race</option>
                    <option value="2">2 Races</option>
                    <option value="3" selected>3 Races</option>
                    <option value="4">4 Races</option>
                    <option value="5">5 Races</option>
                  </select>
                  <button id="nextPageBtn" class="btn secondary">Next ›</button>
                </div>
                <div class="table-responsive">
                  <table>
                    <thead id="driversHead">
                        <!-- header will be built dynamically from EVENTS -->
                    </thead>
                    <tbody id="driversBody">
                        <!-- Drivers will be populated here by JavaScript -->
                    </tbody>
                  </table>
                </div>
            </div>

            <div class="card" id="simCard" style="display: none;">
                <div class="controls">
                    <label>Simulation runs: <input type="number" id="simRuns" value="1000" min="100" max="10000"></label>
                    <button class="btn primary" id="runSimBtn">Run Simulation</button>
                </div>
                <div id="simStatus"></div>
                <div id="simSummary" style="margin-top:10px"></div>
                <div id="simTable" class="stat-table" style="margin-top:10px">
                    <!-- Simulation results will be populated here -->
                </div>
            </div>

            <div class="card" id="standingsCard">
                <h2>Overview — Standings</h2>
                <div class="standings-flex">
                    <div id="driverStandings"></div>
                    <div id="constructorStandings"></div>
                </div>
            </div>
        </div>
    </div>

    // visible window state
let visibleStart = 0;
let PAGE_SIZE = 4;

function getVisibleEvents() {
  return EVENTS.slice(visibleStart, visibleStart + PAGE_SIZE);
}

function prevPage() {
  if (visibleStart === 0) return;
  visibleStart = Math.max(0, visibleStart - PAGE_SIZE);
  rebuildEditor();
}

function nextPage() {
  if (visibleStart + PAGE_SIZE >= EVENTS.length) return;
  visibleStart += PAGE_SIZE;
  rebuildEditor();
}

function clearEvent(eventId) {
  DRIVERS.forEach(d => {
    if (state[d.code] && state[d.code].added) {
      state[d.code].added[eventId] = 0;
    }
  });
  rebuildEditor();
}

function rebuildEditor() {
  buildTableHeader();
  initEditor();
  updateTotals();          // deltas/standings rely on the new header
}

    function getLogo(team){
      // prefer dark logos when dark-mode is active
      if (document?.body?.classList?.contains('dark-mode')) {
        return TEAM_LOGOS_DARK[team] || TEAM_LOGOS[team] || '';
      }
      return TEAM_LOGOS[team] || '';
    }

    // delta reference state (null = leader)
    let deltaRef = null; // {type: 'driver'|'team', id: 'VER'|'McLaren'} or null

    function getDriverTotal(code){
      const base = state[code]?.base || DRIVERS.find(d=>d.code===code)?.base || 0;
      const added = Object.values(state[code]?.added || {}).reduce((a,b)=>a+b,0);
      return base + added;
    }

    function getConstructorTotal(team){
      const drivers = DRIVERS.filter(d=>d.team===team);
      return drivers.reduce((s,d)=> s + getDriverTotal(d.code), 0);
    }

    function setDeltaReference(type, id){
      // toggle: clicking same selection clears to leader
      if (deltaRef && deltaRef.type === type && deltaRef.id === id){
        deltaRef = null;
      } else {
        deltaRef = {type, id};
      }
      // refresh delta displays and visual selection
      refreshEditorDeltas();
      refreshConstructorDeltas();
      // update highlight on standings rows
      updateStandingsSelectionUI();
    }

    function updateStandingsSelectionUI(){
      // remove previous selection classes
      document.querySelectorAll('#driverStandings tr, #constructorStandings tr').forEach(tr=> tr.classList.remove('selected-row'));
      if(!deltaRef) return;
      if(deltaRef.type === 'driver'){
        const el = document.querySelector(`#driverStandings tr[data-driver="${deltaRef.id}"]`);
        if(el) el.classList.add('selected-row');
      } else {
        const key = CSS.escape(deltaRef.id);
        const el = document.querySelector(`#constructorStandings tr[data-cons="${key}"]`);
        if(el) el.classList.add('selected-row');
      }
    }

    function refreshEditorDeltas(){
      // compute reference value
      let refVal = null;
      if(!deltaRef){
        // default leader
        const totals = DRIVERS.map(d=> getDriverTotal(d.code));
        refVal = Math.max(...totals,0);
      } else if(deltaRef.type === 'driver'){
        refVal = getDriverTotal(deltaRef.id);
      } else {
        refVal = getConstructorTotal(deltaRef.id);
      }

      DRIVERS.forEach(d=>{
        const el = document.getElementById(`delta-${d.code}`);
        if(!el) return;
        const val = getDriverTotal(d.code) - refVal;
        if(deltaRef && deltaRef.type==='team'){
          // when comparing to team, show driver vs team (signed)
          el.innerText = val === 0 ? '—' : (val > 0 ? `+${val}` : `${val}`);
        } else {
          // when comparing to driver (or leader), show relative sign (positive = ahead)
          el.innerText = deltaRef && deltaRef.type==='driver' && d.code === deltaRef.id ? '—' :
                        (!deltaRef && getDriverTotal(d.code) === refVal ? '—' : (val > 0 ? `+${val}` : `${val}`));
        }
      });

      // also refresh standings table deltas
      document.querySelectorAll('#driverStandings [data-stand-delta]').forEach(span=>{
        const code = span.dataset.code;
        const val = getDriverTotal(code) - refVal;
        span.innerText = deltaRef && deltaRef.type==='driver' && code === deltaRef.id ? '—' :
                        (!deltaRef && getDriverTotal(code) === refVal ? '—' : (val > 0 ? `+${val}` : `${val}`));
      });
    }

    function refreshConstructorDeltas(){
      let refVal = null;
      if(!deltaRef){
        // default leader constructor
        const consTotals = CONSTRUCTORS.map(c=> getConstructorTotal(c));
        refVal = Math.max(...consTotals,0);
      } else if(deltaRef.type === 'team'){
        refVal = getConstructorTotal(deltaRef.id);
      } else {
        // driver selected => compare constructors to driver total
        refVal = getDriverTotal(deltaRef.id);
      }

      document.querySelectorAll('#constructorStandings [data-cons-delta]').forEach(span=>{
        const team = span.dataset.team;
        const val = getConstructorTotal(team) - refVal;
        span.innerText = deltaRef && deltaRef.type==='team' && team === deltaRef.id ? '—' :
                        (!deltaRef && getConstructorTotal(team) === refVal ? '—' : (val > 0 ? `+${val}` : `${val}`));
      });
    }

    // --- app state (single declaration)
    let state = {};
    let lastSimResult = null;

    // --- helpers for options
    function createRaceOptions(){
      const opts = [{v:'0',t:'0'}];
      for(let i=0;i<RACE_POINTS.length;i++) opts.push({v:RACE_POINTS[i].toString(), t:`P${i+1} (${RACE_POINTS[i]} pts)`});
      return opts;
    }
    function createSprintOptions(){
      const opts = [{v:'0',t:'0'}];
      for(let i=0;i<SPRINT_POINTS.length;i++) opts.push({v:SPRINT_POINTS[i].toString(), t:`P${i+1} (${SPRINT_POINTS[i]} pts)`});
      return opts;
    }
    const raceOpts = createRaceOptions();
    const sprintOpts = createSprintOptions();

    // --- init / UI building
    function initializeState() {
      state = {};
      let firstEmptyIndex = -1;

      DRIVERS.forEach(d => {
          state[d.code] = { base: d.base, added: {} };
      });

      EVENTS.forEach((e, index) => {
          // Find the first event that does NOT have hardcoded results
          if (!e.results && firstEmptyIndex === -1) {
              firstEmptyIndex = index;
          }

          DRIVERS.forEach(d => {
              let points = 0;
              if (e.results) {
                  const pos = e.results.indexOf(d.code);
                  const pointsArr = e.type === 'race' ? RACE_POINTS : SPRINT_POINTS;
                  if (pos !== -1 && pos < pointsArr.length) {
                      points = pointsArr[pos];
                  }
              }
              // This ensures state matches the hardcoding for the UI dropdowns
              state[d.code].added[e.id] = points;
          });
      });

      // Set navigation: Start at the first incomplete race
      if (firstEmptyIndex !== -1) {
          visibleStart = firstEmptyIndex;
      } else {
          // If all races are done, show the last page
          visibleStart = Math.max(0, EVENTS.length - PAGE_SIZE);
      }
    }

      const leaderTotal = driversArr[0]?.total || 0;

    // selection change (with kick/override logic)
    function onSelectChange(e) {
      const sel = e.currentTarget;
      const code = sel.dataset.code;
      const ev = sel.dataset.event;
      const val = Number(sel.value) || 0;

      if (!state[code]) state[code] = {base: 0, added: {}};

      // KICK LOGIC
      if (val > 0) {
          Object.keys(state).forEach(otherCode => {
              if (otherCode !== code && state[otherCode].added[ev] === val) {
                  // Kick the other guy
                  state[otherCode].added[ev] = 0;
                  
                  // Find that guy's dropdown in the DOM and reset it visually
                  const otherSel = document.querySelector(`select[data-code="${otherCode}"][data-event="${ev}"]`);
                  if (otherSel) {
                      otherSel.value = "0";
                  }
              }
          });
      }

      state[code].added[ev] = val;
      updateTotals(); // Recalculate standings
  }

    // totals / standings
    function updateTotals() {
      if (!DRIVERS || !state) return;
      DRIVERS.forEach(d => {
          if (!state[d.code]) return;
          const addedSum = Object.values(state[d.code].added || {}).reduce((a,b) => a+b, 0);
          const total = (state[d.code].base || 0) + addedSum;
          const addedEl = document.getElementById('added-'+d.code);
          const totalEl = document.getElementById('total-'+d.code);
          if (addedEl) addedEl.innerText = '+' + addedSum;
          if (totalEl) totalEl.innerText = total + ' pts';

      // refresh deltas & selection so editor and standings update after any edit/randomize
      try { refreshEditorDeltas(); } catch(e){ /* safe */ }
      try { refreshConstructorDeltas(); } catch(e){ /* safe */ }
      try { updateStandingsSelectionUI(); } catch(e){ /* safe */ }

    // Replace the existing attachEventListeners() with this robust version
    function attachEventListeners() {
      const $ = id => document.getElementById(id);
      const log = (m) => console.log('[listeners] ' + m);

      // safe binder: uses handler if defined, otherwise a sensible fallback
      function bindClick(id, handler, fallback) {
        const el = $(id);
        if (!el) { console.warn(`[listeners] ${id} missing`); return; }
        if (typeof handler === 'function') {
          el.addEventListener('click', handler);
          log(`bound ${id}`);
        } else if (typeof fallback === 'function') {
          el.addEventListener('click', fallback);
          console.warn(`[listeners] ${id} bound to fallback`);
        } else {
          el.addEventListener('click', () => console.warn(`[listeners] ${id} clicked but no handler available`));
          console.warn(`[listeners] ${id} bound to noop`);
        }
      }

      // tabs
      bindClick('tabEditor', () => switchTab('editor'));
      bindClick('tabSim', () => switchTab('sim'));

      // reset: prefer resetAll if present, otherwise re-init state as fallback
      bindClick('resetBtn',
        typeof resetAll === 'function' ? resetAll : () => { initializeState(); buildTableHeader(); initEditor(); updateTotals(); console.warn('Used fallback reset'); }
      );

      // randomize
      bindClick('randomBtn',
        typeof randomize === 'function' ? () => randomize() : () => { console.warn('randomize() not available'); alert('Randomize not available'); }
      );

      // run simulation
      bindClick('runSimBtn', () => {
        const simRunsEl = $('simRuns');
        const runs = Math.min(Math.max(parseInt(simRunsEl?.value) || 1000, 100), 10000);
        runMonteCarlo({ runs });
      });

      // simRuns input guard
      const simRunsEl = $('simRuns');
      if (simRunsEl) {
        simRunsEl.addEventListener('input', function(e){
          const value = parseInt(e.target.value);
          if (isNaN(value) || value < 100) e.target.value = 100;
          else if (value > 10000) e.target.value = 10000;
        });
        log('bound simRuns input');
      } else console.warn('[listeners] simRuns missing');

      // dark mode toggle (safe)
      const darkBtn = $('darkModeBtn');
      if (darkBtn) {
        darkBtn.addEventListener('click', () => {
          document.body.classList.toggle('dark-mode');
          localStorage.setItem('f1-dark-mode', document.body.classList.contains('dark-mode') ? '1' : '0');
          darkBtn.textContent = document.body.classList.contains('dark-mode') ? '☀️ Light' : '🌙 Dark';
          // re-render UI so getLogo() picks correct images
          initEditor();
          updateConstructorsAndDriversStandings();
          renderSimResults();
          updateTotals();
        });
        log('bound darkModeBtn');
        if (localStorage.getItem('f1-dark-mode') === '1') {
          document.body.classList.add('dark-mode');
          darkBtn.textContent = '☀️ Light';
        }
      } else console.warn('[listeners] darkModeBtn missing');
    }

    // Diagnostic helpers — show uncaught errors and confirm listeners
    (function enableDiagnostics(){
      // visible overlay for the first error
      const overlay = document.createElement('div');
      overlay.id = 'js-error-overlay';
      overlay.style = 'position:fixed;right:12px;bottom:12px;z-index:99999;background:#fff;color:#000;padding:10px 12px;border-radius:8px;box-shadow:0 6px 20px rgba(0,0,0,0.25);max-width:360px;font-family:Inter,sans-serif;font-size:13px;display:none;';
      document.body?.appendChild(overlay);

      function show(msg){
        overlay.innerText = msg;
        overlay.style.display = 'block';
      }

      window.addEventListener('error', function(evt){
        try{ show('Error: ' + (evt.error?.message || evt.message || 'Unknown error')); }catch(e){ console.error(e); }
        console.error('Unhandled error', evt.error || evt.message, evt);
      });

      window.addEventListener('unhandledrejection', function(evt){
        try{ show('UnhandledRejection: ' + (evt.reason?.message || JSON.stringify(evt.reason) || evt.reason)); }catch(e){ console.error(e); }
        console.error('Unhandled promise rejection', evt.reason);
      });

      // patch attachEventListeners to log when it runs
      const origAttach = window.attachEventListeners;
      window.attachEventListeners = function(...args){
        console.log('attachEventListeners() starting');
        try{
          if (origAttach) origAttach.apply(this, args);
          else {
            // If attachEventListeners isn't defined yet, call existing in-file function later
            console.warn('attachEventListeners not defined at patch time');
          }
          console.log('attachEventListeners() done');
        }catch(err){
          console.error('attachEventListeners error', err);
          show('attachEventListeners error: ' + (err.message || err));
          throw err;
        }
      };
    })();

    // utility: weighted shuffle (sampling without replacement)
    function weightedShuffle(items, weights){
      const list = items.slice();
      const w = weights.slice();
      const out = [];
      while(list.length){
        const total = w.reduce((a,b)=>a+b,0);
        let r = Math.random() * total;
        let idx = 0;
        while(r > w[idx]) { r -= w[idx]; idx++; }
        out.push(list[idx]);
        list.splice(idx,1);
        w.splice(idx,1);
      }
      return out;
    }

    function getRemainingEvents() {
      return EVENTS.filter(ev => !ev.results);
    }

    function resetAll() {
      // Re-apply base and hardcoded results without changing the visible page
      DRIVERS.forEach(d => {
          state[d.code] = { base: d.base, added: {} };
      });

      EVENTS.forEach(e => {
          DRIVERS.forEach(d => {
              let points = 0;
              if (e.results) {
                  const pos = e.results.indexOf(d.code);
                  const pointsArr = e.type === 'race' ? RACE_POINTS : SPRINT_POINTS;
                  if (pos !== -1 && pos < pointsArr.length) {
                      points = pointsArr[pos];
                  }
              }
              state[d.code].added[e.id] = points;
          });
      });

      // Completely rebuild the UI so headers, dropdowns, and totals sync up perfectly
      rebuildEditor();
    }

    // randomize editor (mutates state)
    function randomize(biasStrength = 1.4, noise = 0.18, topCount = 6){
      const codes = DRIVERS.map(d=>d.code);
      // ensure state shape
      codes.forEach(c => { if(!state[c]) state[c] = { base: 0, added: {} }; if(!state[c].added) state[c].added = {}; });

      EVENTS.forEach(ev => {
        const points = ev.type === 'race' ? RACE_POINTS : SPRINT_POINTS;

        // To remove bias, use equal weights for all drivers
        const weights = codes.map(() => 1); // Equal probability for each driver to be in any position

        const order = weightedShuffle(codes, weights);
        order.forEach((code, idx) => {
          const pts = points[idx] || 0;
          state[code].added[ev.id] = pts;
        });
      });

      updateTotals();
      initEditor();
    }

    function runMonteCarlo({ runs = 1000 } = {}) {
      runs = Math.max(100, Math.min(20000, runs || 1000));

      const driverCounts = {};
      DRIVERS.forEach(d => driverCounts[d.code] = {champ:0, top2:0, top3:0});
      const teamCounts = {};
      CONSTRUCTORS.forEach(t => teamCounts[t] = {champ:0, top2:0, top3:0});

      // Backup current user predictions + past results
      const savedState = JSON.parse(JSON.stringify(state));

      const remainingEvents = getRemainingEvents();

      for (let i = 0; i < runs; i++) {
        // Start from exact current state (past results + YOUR manual predictions stay 100% fixed)
        const simState = {};
        DRIVERS.forEach(d => {
          simState[d.code] = {
            base: d.base,
            added: JSON.parse(JSON.stringify(savedState[d.code]?.added || {}))
          };
        });

        // ONLY randomize the remaining (future) races
        remainingEvents.forEach(ev => {
          const points = ev.type === 'race' ? RACE_POINTS : SPRINT_POINTS;
          const codes = DRIVERS.map(d => d.code);

          // Weighted by current total points in THIS simulation (+5 baseline)
          const weights = codes.map(code => {
            const totalSoFar = simState[code].base +
                              Object.values(simState[code].added || {}).reduce((a, b) => a + b, 0);
            return Math.max(totalSoFar + 5, 5);
          });

          const order = weightedShuffle(codes, weights);

          // REPLACE points (never add on top of existing values)
          order.forEach((code, idx) => {
            simState[code].added[ev.id] = points[idx] || 0;
          });
        });

        // Final totals
        const final = DRIVERS.map(d => ({
          code: d.code,
          team: d.team,
          total: simState[d.code].base + Object.values(simState[d.code].added || {}).reduce((a, b) => a + b, 0)
        })).sort((a, b) => b.total - a.total);

        // Drivers
        if (final[0]) driverCounts[final[0].code].champ++;
        final.slice(0, 2).forEach(f => driverCounts[f.code].top2++);
        final.slice(0, 3).forEach(f => driverCounts[f.code].top3++);

        // Constructors
        const consTotals = {};
        CONSTRUCTORS.forEach(t => consTotals[t] = 0);
        final.forEach(f => consTotals[f.team] += f.total);
        const consArr = Object.keys(consTotals)
          .map(t => ({team: t, total: consTotals[t]}))
          .sort((a, b) => b.total - a.total);

        if (consArr[0]) teamCounts[consArr[0].team].champ++;
        consArr.slice(0, 2).forEach(c => teamCounts[c.team].top2++);
        consArr.slice(0, 3).forEach(c => teamCounts[c.team].top3++);
      }

      // Calculate percentages
      const driverStats = {};
      Object.keys(driverCounts).forEach(code => {
        driverStats[code] = {
          champ: (100 * driverCounts[code].champ / runs),
          top2:  (100 * driverCounts[code].top2  / runs),
          top3:  (100 * driverCounts[code].top3  / runs)
        };
      });

      const teamStats = {};
      Object.keys(teamCounts).forEach(team => {
        teamStats[team] = {
          champ: (100 * teamCounts[team].champ / runs),
          top2:  (100 * teamCounts[team].top2  / runs),
          top3:  (100 * teamCounts[team].top3  / runs)
        };
      });

      lastSimResult = { driverStats, teamStats };
      renderSimResults();

      // Nice status message
      document.getElementById('simStatus').innerHTML = `
        <small style="color:var(--muted)">
          ✅ Simulated <b>${runs}</b> runs • <b>${remainingEvents.length}</b> future races randomized
        </small>`;
    }

    // update attachEventListeners: ensure dark toggle re-renders logos and editor
    function attachEventListeners() {
      const $ = id => document.getElementById(id);
      const log = (m) => console.log('[listeners] ' + m);

      function bindClick(id, handler, fallback) {
        const el = $(id);
        if (!el) { console.warn(`[listeners] ${id} missing`); return; }
        if (typeof handler === 'function') {
          el.addEventListener('click', handler);
          log(`bound ${id}`);
        } else if (typeof fallback === 'function') {
          el.addEventListener('click', fallback);
          console.warn(`[listeners] ${id} bound to fallback`);
        } else {
          el.addEventListener('click', () => console.warn(`[listeners] ${id} clicked but no handler available`));
          console.warn(`[listeners] ${id} bound to noop`);
        }
      }
      bindClick('prevPageBtn', prevPage);
      bindClick('nextPageBtn', nextPage);
      // Page Size Dropdown Listener
      const pageSizeEl = $('pageSizeSelect');
      if (pageSizeEl) {
        pageSizeEl.addEventListener('change', (e) => {
          PAGE_SIZE = parseInt(e.target.value, 10);
          // Snap back to the first race to avoid blank pages when increasing size
          visibleStart = 0; 
          rebuildEditor();
        });
        log('bound pageSizeSelect');
      }
      bindClick('tabEditor', () => switchTab('editor'));
      bindClick('tabSim', () => switchTab('sim'));
      bindClick('resetBtn', typeof resetAll === 'function' ? resetAll : () => { initializeState(); buildTableHeader(); initEditor(); updateTotals(); console.warn('Used fallback reset'); });
      bindClick('randomBtn', () => randomize());
      bindClick('runSimBtn', () => {
        const simRunsEl = $('simRuns');
        const runs = Math.min(Math.max(parseInt(simRunsEl?.value) || 1000, 100), 10000);
        runMonteCarlo({ runs });
      });

      const simRunsEl = $('simRuns');
      if (simRunsEl) simRunsEl.addEventListener('input', function(e){ const value = parseInt(e.target.value); if (isNaN(value) || value < 100) e.target.value = 100; else if (value > 10000) e.target.value = 10000; });

      const darkBtn = $('darkModeBtn');
      if (darkBtn) {
        darkBtn.addEventListener('click', () => {
          document.body.classList.toggle('dark-mode');
          localStorage.setItem('f1-dark-mode', document.body.classList.contains('dark-mode') ? '1' : '0');
          darkBtn.textContent = document.body.classList.contains('dark-mode') ? '☀️ Light' : '🌙 Dark';
          initEditor();
          updateConstructorsAndDriversStandings();
          renderSimResults();
          updateTotals();
        });
        log('bound darkModeBtn');
        if (localStorage.getItem('f1-dark-mode') === '1') {
          document.body.classList.add('dark-mode');
          darkBtn.textContent = '☀️ Light';
        }
      } else console.warn('[listeners] darkModeBtn missing');
}
    </script>
